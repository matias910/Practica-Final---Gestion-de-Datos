name: Deploy to GitHub Pages

on:
  push:
    branches: 'main'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './Torneo-Futbol/package-lock.json' # Points to subfolder

      - name: Install dependencies
        run: npm ci
        working-directory: ./Torneo-Futbol # Changes directory to your React app

      - name: Build
        run: npm run build
        working-directory: ./Torneo-Futbol # Changes directory to your React app

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Torneo-Futbol/dist' # Points to the compiled subfolder output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4